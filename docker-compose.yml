# Local Postgres for qascan development.
#   docker compose up -d
# Then set in .env:
#   DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/qascan
services:
  db:
    image: postgres:16
    container_name: qascan-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qascan
    ports:
      - "5432:5432"
    volumes:
      - qascan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qascan_pgdata:
